<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trò chơi giấc mơ của bé Phụng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            overflow: hidden;
            background: #020617; /* Xanh đen sâu thẳm */
            touch-action: none;
            user-select: none;
        }

        #game-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            color: #bfdbfe;
            z-index: 10;
        }

        /* Thông điệp yêu thương hiện lên */
        #love-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f9a8d4; /* Màu hồng nhạt */
            font-size: 1.5rem;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(244, 114, 182, 0.6);
            opacity: 0;
            transition: opacity 1.5s ease, transform 1.5s ease;
            pointer-events: none;
            z-index: 50;
            text-align: center;
            width: 80%;
            max-width: 500px;
        }

        #love-message.show {
            opacity: 1;
            transform: translate(-50%, -65%);
        }

        .instruction {
            position: fixed;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: rgba(191, 219, 254, 0.4);
            font-size: 0.8rem;
            pointer-events: none;
        }

        .glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="glow" style="top: 10%; left: 10%;"></div>
    <div class="glow" style="bottom: 10%; right: 10%; background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);"></div>

    <div class="ui-overlay">
        <h1 class="text-xl md:text-2xl font-light tracking-widest opacity-80 uppercase">Giấc mơ của bé Phụng</h1>
        <div class="mt-2 text-sm">Số ngôi sao hái được: <span id="score">0</span></div>
    </div>

    <div id="love-message">Yêu bé Phụng nhất!</div>

    <div class="instruction">Chạm vào sao để thấy điều bất ngờ...</div>

    <canvas id="game-canvas"></canvas>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const loveMessage = document.getElementById('love-message');

        let width, height;
        let particles = [];
        let stars = [];
        let score = 0;

        // Danh sách 50 câu nói yêu thương
        const loveQuotes = [
            "Hoàng thương bé Phụng lắm!",
            "Bé Phụng ngủ ngon nhé ❤️",
            "Yêu công chúa của anh nhất!",
            "Nhớ bé Phụng nhiều ơi là nhiều",
            "Bé là điều tuyệt vời nhất của anh",
            "Ngủ ngoan trong vòng tay anh nhé",
            "Hôn nhẹ lên trán bé yêu này",
            "Cả thế giới này anh chỉ yêu mình bé",
            "Bé Phụng là cục nợ đáng yêu của anh",
            "Chúc em có giấc mơ thật đẹp",
            "Mãi mãi yêu bé Phụng!",
            "Anh sẽ luôn ở bên che chở cho bé",
            "Bé Phụng là mặt trời nhỏ của Hoàng",
            "Thương bé Phụng nhất trên đời",
            "Đừng lo gì cả, có anh đây rồi",
            "Em là món quà quý giá nhất anh có",
            "Mơ về anh một xíu nhé bé yêu",
            "Yêu bé từ tận đáy lòng",
            "Bé Phụng ngoan nhất trần đời",
            "Tim anh chỉ có chỗ cho bé thôi",
            "Cảm ơn em đã đến bên anh",
            "Hứa sẽ thương bé suốt đời này",
            "Bé Phụng đừng thức khuya nhé",
            "Thế giới của anh xoay quanh bé",
            "Muốn ôm bé vào lòng ngay lúc này",
            "Bé là bình yên của anh",
            "Thương quá đi mất bé Phụng ơi",
            "Mong mọi điều tốt lành đến với em",
            "Yêu bé nhiều không đếm xuể",
            "Bé Phụng là duy nhất!",
            "Cục cưng của anh ngủ ngon nha",
            "Anh đang nhớ em da diết đây",
            "Bé Phụng cười xinh lắm luôn",
            "Yêu từng chút một thuộc về em",
            "Anh nguyện làm vì sao bảo vệ em",
            "Bé là niềm hạnh phúc của anh",
            "Chỉ cần bé vui là anh cũng vui",
            "Dành trọn tình cảm này cho bé Phụng",
            "Em là thiên thần của anh",
            "Yêu bé Phụng hơn cả bản thân mình",
            "Hôn bé một cái thật kêu nè",
            "Bé Phụng ơi, Hoàng yêu bé lắm!",
            "Em là lý do để anh cố gắng",
            "Gặp được bé là may mắn của anh",
            "Mãi mãi một tình yêu cho bé Phụng",
            "Bé là hơi thở của anh đó",
            "Thương bé không biết để đâu cho hết",
            "Ngủ ngon và thật xinh đẹp nhé em",
            "Bé Phụng là tất cả của anh",
            "Yêu bé, yêu bé, yêu bé mãi!"
        ];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSoothingNote() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(220 + Math.random() * 220, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1.5);
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = height + 50;
                this.size = Math.random() * 12 + 8;
                this.speed = Math.random() * 0.4 + 0.2;
                this.opacity = 0;
                this.targetOpacity = Math.random() * 0.5 + 0.3;
                this.angle = Math.random() * Math.PI * 2;
                this.pulse = Math.random() * 0.02;
            }

            update() {
                this.y -= this.speed;
                this.angle += this.pulse;
                if (this.opacity < this.targetOpacity) this.opacity += 0.01;
                this.x += Math.sin(this.angle) * 0.4;
                if (this.y < -50) this.reset();
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#fef08a';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#fef08a';
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    ctx.lineTo(Math.cos((18 + i * 72) / 180 * Math.PI) * this.size,
                               Math.sin((18 + i * 72) / 180 * Math.PI) * this.size);
                    ctx.lineTo(Math.cos((54 + i * 72) / 180 * Math.PI) * (this.size / 2),
                               Math.sin((54 + i * 72) / 180 * Math.PI) * (this.size / 2));
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.life = 1.0;
                this.color = `hsla(${200 + Math.random() * 40}, 100%, 80%, `;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.015;
            }

            draw() {
                ctx.fillStyle = this.color + this.life + ')';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            stars = [];
            for (let i = 0; i < 12; i++) {
                stars.push(new Star());
            }
        }

        function showLoveMessage() {
            // Chọn ngẫu nhiên 1 câu từ 50 câu
            const randomIndex = Math.floor(Math.random() * loveQuotes.length);
            loveMessage.textContent = loveQuotes[randomIndex];
            
            loveMessage.classList.add('show');
            setTimeout(() => {
                loveMessage.classList.remove('show');
            }, 3000);
        }

        function handleTouch(e) {
            const touchX = e.clientX || (e.touches && e.touches[0].clientX);
            const touchY = e.clientY || (e.touches && e.touches[0].clientY);

            if (audioCtx.state === 'suspended') audioCtx.resume();

            stars.forEach((star) => {
                const dist = Math.hypot(star.x - touchX, star.y - touchY);
                if (dist < 50) {
                    for (let i = 0; i < 20; i++) {
                        particles.push(new Particle(star.x, star.y));
                    }
                    playSoothingNote();
                    star.reset();
                    
                    score++;
                    scoreElement.innerText = score;

                    if (score > 0 && score % 5 === 0) {
                        showLoveMessage();
                    }
                }
            });
        }

        window.addEventListener('mousedown', handleTouch);
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTouch(e);
        }, { passive: false });

        function animate() {
            ctx.fillStyle = 'rgba(2, 6, 23, 0.2)'; 
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.update();
                star.draw();
            });

            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
