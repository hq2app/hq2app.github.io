<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sát Thần - Đập Boss Bang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --secondary: #f59e0b;
            --dark: #1e1b4b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Patrick Hand', cursive;
            background-color: var(--dark);
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            color: white;
        }

        .game-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle, #2e1065 0%, #0f172a 100%);
        }

        .header {
            width: 100%;
            padding: 1rem;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 2px solid var(--primary);
            z-index: 10;
        }

        .stat-box {
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #a78bfa;
            text-transform: uppercase;
        }

        .stat-value {
            font-family: 'Bungee', cursive;
            font-size: 1.5rem;
            color: var(--secondary);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            margin-top: auto;
            margin-bottom: auto;
        }

        .hole {
            position: relative;
            aspect-ratio: 1/1;
            background: #312e81;
            border-radius: 50%;
            border: 4px solid #4338ca;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.8), 0 5px 0 #1e1b4b;
            overflow: hidden;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 12-8.5 8.5c-.83.83-2.17.83-3 0 0 0 0 0 0 0-.83-.83-.83-2.17 0-3L12 9"/><path d="M17.64 15 22 10.64"/><path d="m20.91 11.7-1.25-1.25c-.6-.6-.9-1.39-.9-2.17V6.52a3 3 0 0 0-3-3H14.5c-.78 0-1.57.3-2.17.9L11.08 5.67"/></svg>'), auto;
        }

        .mole {
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 80%;
            transition: bottom 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: all;
        }

        .mole.up {
            bottom: 10%;
        }

        .mole svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .hit-effect {
            position: absolute;
            pointer-events: none;
            color: var(--secondary);
            font-family: 'Bungee', cursive;
            font-size: 1.2rem;
            animation: flyUp 0.5s ease-out forwards;
            z-index: 20;
        }

        @keyframes flyUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        .bang-chu {
            filter: drop-shadow(0 0 10px #facc15) !important;
        }

        /* Modal Styles */
        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 2rem;
            text-align: center;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            padding: 1rem 2.5rem;
            border-radius: 9999px;
            font-family: 'Bungee', cursive;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
            transition: transform 0.2s;
            margin-top: 1rem;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .bang-name {
            font-family: 'Bungee', cursive;
            background: linear-gradient(to right, #facc15, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .grid-container {
                gap: 10px;
                padding: 10px;
            }
            .stat-value { font-size: 1.2rem; }
            .bang-name { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="stat-box">
            <div class="stat-label">Thời gian</div>
            <div id="time" class="stat-value">30</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Điểm số</div>
            <div id="score" class="stat-value">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Kỷ lục</div>
            <div id="high-score" class="stat-value">0</div>
        </div>
    </div>

    <div class="grid-container" id="grid">
        <!-- 9 holes generated via JS -->
    </div>

    <!-- UI Overlays -->
    <div id="modal">
        <h1 class="bang-name">SÁT THẦN</h1>
        <p id="modal-text" class="mb-4 text-lg">Chào mừng anh em bang Sát Thần.<br>Hãy đập tan các Boss, nhưng đừng đập nhầm Bang Chủ!</p>
        <div id="final-score-display" class="hidden mb-4">
            <p class="text-2xl">Điểm của bạn: <span id="final-score" class="text-yellow-400 font-bold">0</span></p>
        </div>
        <button id="start-btn" class="btn">BẮT ĐẦU</button>
    </div>
</div>

<script>
    const grid = document.getElementById('grid');
    const scoreBoard = document.getElementById('score');
    const timeBoard = document.getElementById('time');
    const highScoreBoard = document.getElementById('high-score');
    const startBtn = document.getElementById('start-btn');
    const modal = document.getElementById('modal');
    const modalText = document.getElementById('modal-text');
    const finalScoreDisplay = document.getElementById('final-score-display');
    const finalScore = document.getElementById('final-score');

    let score = 0;
    let timeLeft = 30;
    let gameActive = false;
    let lastHole;
    let moleTimeout;
    let gameTimer;

    // Boss SVGs
    const BOSS_ICON = `
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L4 5V11C4 16.1 7.4 20.9 12 22C16.6 20.9 20 16.1 20 11V5L12 2Z" fill="#ef4444" stroke="#7f1d1d" stroke-width="1"/>
            <circle cx="9" cy="10" r="1.5" fill="white"/>
            <circle cx="15" cy="10" r="1.5" fill="white"/>
            <path d="M8 15C8 15 10 17 12 17C14 17 16 15 16 15" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M12 2L12 22" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
        </svg>
    `;

    const BANG_CHU_ICON = `
        <svg class="bang-chu" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L19 5V11C19 15.4 16.2 19.3 12 20.5C7.8 19.3 5 15.4 5 11V5L12 2Z" fill="#facc15" stroke="#854d0e" stroke-width="1"/>
            <path d="M12 6V10M12 10L10 8M12 10L14 8" stroke="#854d0e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="9" cy="13" r="1" fill="#854d0e"/>
            <circle cx="15" cy="13" r="1" fill="#854d0e"/>
            <path d="M10 16C10 16 11 17 12 17C13 17 14 16 14 16" stroke="#854d0e" stroke-width="1.5" stroke-linecap="round"/>
            <rect x="8" y="3" width="8" height="2" fill="#f97316"/>
        </svg>
    `;

    // Initialize holes
    for (let i = 0; i < 9; i++) {
        const hole = document.createElement('div');
        hole.classList.add('hole');
        hole.innerHTML = `<div class="mole" data-index="${i}"></div>`;
        grid.appendChild(hole);
    }

    const moles = document.querySelectorAll('.mole');

    function randomTime(min, max) {
        return Math.round(Math.random() * (max - min) + min);
    }

    function randomHole(moles) {
        const idx = Math.floor(Math.random() * moles.length);
        const hole = moles[idx];
        if (hole === lastHole) return randomHole(moles);
        lastHole = hole;
        return hole;
    }

    function pop() {
        if (!gameActive) return;

        const time = randomTime(600, 1200) - (score * 2); // Faster as score increases
        const mole = randomHole(moles);
        
        // 20% chance to be Bang Chu
        const isBangChu = Math.random() < 0.2;
        mole.innerHTML = isBangChu ? BANG_CHU_ICON : BOSS_ICON;
        mole.dataset.type = isBangChu ? 'bangchu' : 'boss';
        
        mole.classList.add('up');

        moleTimeout = setTimeout(() => {
            mole.classList.remove('up');
            if (gameActive) pop();
        }, time);
    }

    function whack(e) {
        if (!e.isTrusted) return; // Anti-cheat
        const mole = e.currentTarget;
        if (!mole.classList.contains('up')) return;

        const type = mole.dataset.type;
        
        // Visual feedback
        const rect = mole.getBoundingClientRect();
        createHitEffect(rect.left + rect.width/2, rect.top, type === 'bangchu' ? 'NHẦM RỒI!' : '+10');

        if (type === 'bangchu') {
            gameOver("Bạn đã đập nhầm Bang Chủ! Bị trừ sạch điểm!");
            score = 0;
            scoreBoard.textContent = score;
        } else {
            score += 10;
            mole.classList.remove('up');
            scoreBoard.textContent = score;
            
            // Haptic feedback for mobile
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }
    }

    function createHitEffect(x, y, text) {
        const effect = document.createElement('div');
        effect.className = 'hit-effect';
        effect.style.left = x + 'px';
        effect.style.top = y + 'px';
        effect.textContent = text;
        if (text === 'NHẦM RỒI!') effect.style.color = '#ef4444';
        document.body.appendChild(effect);
        setTimeout(() => effect.remove(), 500);
    }

    function startGame() {
        score = 0;
        timeLeft = 30;
        gameActive = true;
        scoreBoard.textContent = 0;
        timeBoard.textContent = timeLeft;
        modal.classList.add('hidden');
        finalScoreDisplay.classList.add('hidden');

        pop();
        
        gameTimer = setInterval(() => {
            timeLeft--;
            timeBoard.textContent = timeLeft;
            if (timeLeft <= 0) {
                gameOver("Hết thời gian! Anh em Sát Thần quá đỉnh!");
            }
        }, 1000);
    }

    function gameOver(message) {
        gameActive = false;
        clearInterval(gameTimer);
        clearTimeout(moleTimeout);
        moles.forEach(m => m.classList.remove('up'));

        // High score logic
        const currentHS = localStorage.getItem('sat-than-highscore') || 0;
        if (score > currentHS) {
            localStorage.setItem('sat-than-highscore', score);
            highScoreBoard.textContent = score;
            message = "KỶ LỤC MỚI! " + message;
        }

        modalText.innerHTML = message;
        finalScore.textContent = score;
        finalScoreDisplay.classList.remove('hidden');
        modal.classList.remove('hidden');
        startBtn.textContent = "CHƠI LẠI";
    }

    // Event Listeners
    moles.forEach(mole => mole.addEventListener('click', whack));
    moles.forEach(mole => mole.addEventListener('touchstart', (e) => {
        e.preventDefault();
        whack(e);
    }));

    startBtn.addEventListener('click', startGame);

    // Initial load
    highScoreBoard.textContent = localStorage.getItem('sat-than-highscore') || 0;

</script>

</body>
</html>
