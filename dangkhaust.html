<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Đãng Khấu (Sát Thần)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', 'Roboto', sans-serif;
            background-color: #f8f9fa;
            color: #3c4043;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: calc(70px + env(safe-area-inset-bottom));
        }

        .google-card {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #dadce0;
            transition: box-shadow 0.2s;
        }

        .badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        /* Màu hệ phái chuẩn Google */
        .badge-hh { background: #fce8e6; color: #d93025; }
        .badge-al { background: #e8f0fe; color: #1a73e8; }
        .badge-ys { background: #e6f4ea; color: #1e8e3e; } /* Xanh lá mặc định */
        .badge-mg { background: #f3e8fd; color: #9333ea; }
        .badge-dk { background: #feefc3; color: #e37400; }
        .badge-cc { background: #fce8e6; color: #ea4335; }
        .badge-xt { background: #fff4e5; color: #fb8c00; }
        .badge-ps { background: #e4f7fb; color: #00acc1; }
        .badge-hk { background: #f1f3f4; color: #5f6368; }
        .badge-dn { background: #f8f9fa; color: #70757a; }
        .badge-gs { background: #e8eaed; color: #3c4043; }
        
        /* Màu Xanh Bầu Trời riêng cho Sát và Tiểu Ất */
        .badge-sky { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }

        .section-header {
            font-size: 14px;
            font-weight: 500;
            color: #202124;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 4px;
        }

        .row-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f3f4;
        }
        .row-item:last-child { border-bottom: none; }

        .google-blue { color: #1a73e8; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #ffffff;
            border-top: 1px solid #dadce0;
            display: flex;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
            height: calc(60px + env(safe-area-inset-bottom));
        }

        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #5f6368;
            font-size: 11px;
            font-weight: 500;
            gap: 4px;
            transition: all 0.2s;
        }

        .nav-btn.active {
            color: #1a73e8;
            background: rgba(26, 115, 232, 0.04);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-out forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: #ffffff;
            border-bottom: 1px solid #dadce0;
        }
    </style>
</head>
<body class="bg-[#f8f9fa]">

    <header class="sticky-header mb-6">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center text-white text-lg shadow-sm">
                    <i class="fas fa-layer-group"></i>
                </div>
                <div>
                    <h1 class="text-lg font-600 text-gray-900 tracking-tight leading-none">Đãng Khấu (Sát Thần)</h1>
                    <p class="text-[10px] text-gray-500 uppercase font-bold tracking-wider mt-1">Cập nhật CN, 12/04</p>
                </div>
            </div>
            <div class="bg-blue-50 border border-blue-100 px-3 py-1 rounded-full flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
                <span class="text-[10px] font-700 text-blue-700 uppercase">Hạng GIÁP</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 space-y-8">
        
        <!-- TAB 1: ĐIỀU PHỐI & THÀNH VIÊN -->
        <div id="tab-squad" class="tab-content active">
            
            <!-- Xoay Tua -->
            <section class="mb-10">
                <h2 class="section-header">
                    <i class="fas fa-exchange-alt google-blue"></i>
                    Điều phối xoay tua (5 người)
                </h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="google-card p-0 overflow-hidden shadow-sm">
                        <div class="px-5 py-3 bg-red-50/50 border-b border-red-100 flex justify-between items-center">
                            <span class="text-sm font-600 text-red-600">Rời trận sau Boss 1</span>
                            <i class="fas fa-sign-out-alt text-red-300"></i>
                        </div>
                        <div class="grid grid-cols-1 divide-y divide-gray-100" id="out-grid"></div>
                    </div>

                    <div class="google-card p-0 overflow-hidden shadow-sm">
                        <div class="px-5 py-3 bg-green-50/50 border-b border-green-100 flex justify-between items-center">
                            <span class="text-sm font-600 text-green-700">Vào trận từ Boss 2</span>
                            <i class="fas fa-sign-in-alt text-green-300"></i>
                        </div>
                        <div class="grid grid-cols-1 divide-y divide-gray-100" id="in-grid"></div>
                    </div>
                </div>
            </section>

            <!-- Full Boss -->
            <section>
                <div class="flex items-center justify-between mb-4 px-1">
                    <h2 class="section-header mb-0">
                        <i class="fas fa-users google-blue"></i>
                        Thành viên tham chiến chính (49)
                    </h2>
                </div>
                <div class="google-card overflow-hidden shadow-sm">
                    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 divide-x divide-y divide-gray-100" id="member-grid"></div>
                </div>
            </section>
        </div>

        <!-- TAB 2: ĐẤU GIÁ -->
        <div id="tab-auction" class="tab-content">
            <h2 class="section-header">
                <i class="fas fa-tag google-blue"></i>
                Lộ trình đấu giá vật phẩm
            </h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" id="auction-grid">
                <!-- Nội dung render bằng JS -->
            </div>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button onclick="switchTab('squad')" id="btn-squad" class="nav-btn active">
            <i class="fas fa-users-cog text-lg"></i>
            <span>Đội hình</span>
        </button>
        <button onclick="switchTab('auction')" id="btn-auction" class="nav-btn">
            <i class="fas fa-gavel text-lg"></i>
            <span>Đấu giá</span>
        </button>
    </nav>

    <script>
        // Danh sách cần đổi màu đặc biệt
        const skyBlueMembers = ["Sát", "Tiểu Ất"];

        const membersData = [
            {id: 1, name: "Vô Ảnh", class: "AL"}, {id: 2, name: "Vịt", class: "XT"},
            {id: 3, name: "CANDY", class: "YS"}, {id: 4, name: "HOANG", class: "HH"},
            {id: 5, name: "Vũ Vũ", class: "DK"}, {id: 6, name: "Kem Siêu Nhậu", class: "PS"},
            {id: 7, name: "Tiêu Họa", class: "HH"}, {id: 8, name: "Lucie", class: "CC"},
            {id: 9, name: "Rice", class: "XT"}, {id: 10, name: "Nợ Máu Trả Mana", class: "CC"},
            {id: 11, name: "Nguyệt Mộng Thanh Ly", class: "YS"}, {id: 12, name: "Xíu Siêu Quạo", class: "YS"},
            {id: 13, name: "BOSSYLAMB", class: "HH"}, {id: 14, name: "LILITH", class: "DK"},
            {id: 15, name: "Yeong", class: "MG"}, {id: 16, name: "Chìn", class: "YS"},
            {id: 17, name: "Tố Tố", class: "HK"}, {id: 18, name: "Phong Nguyệt", class: "HH"},
            {id: 19, name: "Lord", class: "HH"}, {id: 20, name: "Linh anh", class: "HH"},
            {id: 21, name: "Em Bé Tập Ngồi", class: "YS"}, {id: 22, name: "Milam", class: "HK"},
            {id: 23, name: "Bông", class: "DN"}, {id: 24, name: "PEHUYEN", class: "YS"},
            {id: 25, name: "Tiểu Hạo Nhiên", class: "DK"}, {id: 26, name: "Tiểu Ất", class: "YS"},
            {id: 27, name: "Sát", class: "YS"}, {id: 28, name: "Mỹ nữ siêu báo", class: "YS"},
            {id: 29, name: "Cá Voi Xanh", class: "HK"}, {id: 30, name: "Bơ Sữa", class: "HH"},
            {id: 31, name: "PEMY", class: "HH"}, {id: 32, name: "Đường Cà Phê", class: "AL"},
            {id: 33, name: "Tiểu Linh Ngư", class: "HK"}, {id: 34, name: "LeoSensei", class: "XT"},
            {id: 35, name: "Hoài Thương", class: "PS"}, {id: 36, name: "DEATH", class: "XT"},
            {id: 37, name: "Phoebe", class: "YS"}, {id: 38, name: "Tiểu Bạch Xiu", class: "DN"},
            {id: 39, name: "Jison", class: "HK"}, {id: 40, name: "Tiểu Bình An", class: "HK"},
            {id: 41, name: "Minh Châu", class: "AL"}, {id: 42, name: "Cá Nhỏ", class: "YS"},
            {id: 43, name: "Nhật Nguyệt Thánh Đế", class: "GS"}, {id: 44, name: "Ysa", class: "YS"},
            {id: 45, name: "Tử Huyết", class: "HK"}, {id: 46, name: "Trư Ngộ Hiên", class: "CC"},
            {id: 47, name: "Tôn Ngộ Bin", class: "MG"}, {id: 48, name: "Yomost", class: "HH"},
            {id: 49, name: "Ashdale", class: "XT"}
        ];

        const outList = [
            {name: "Cam", class: "DK"}, {name: "An iu", class: "GS"},
            {name: "Minh", class: "MG"}, {name: "Anna", class: "DK"},
            {name: "Lưu Vân", class: "MG"}
        ];
        const inList = [
            {name: "Billion", class: "MG"}, {name: "Tacia", class: "DN"},
            {name: "Black Panther", class: "GS"}, {name: "Du Thần", class: "DK"},
            {name: "TN Tiểu Mây", class: "DN"}
        ];

        const auctionData = [
            { label: "Chìa Bảo Rương", now: "LILITH", icon: "fa-key", color: "blue", next: ["Trường Hà Lạc Nhật", "Đường Cà Phê", "Bông", "Sói"] },
            { label: "Dùi Kim Cương", now: "LILITH", icon: "fa-gem", color: "purple", next: ["LILITH", "LILITH", "LILITH", "LILITH"] },
            { label: "Rương TB 137", now: "PEHUYEN(9r)", icon: "fa-box-open", color: "orange", next: ["Trống", "Trống", "Trống", "Trống"] },
            { label: "Rương TB 129", now: "Trống", icon: "fa-boxes", color: "green", next: ["Trống", "Trống", "Trống", "Trống"] }
        ];

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function createItem(name, className, id = null) {
            // Kiểm tra xem có nằm trong danh sách đổi màu bầu trời không
            const badgeClass = skyBlueMembers.includes(name) ? 'badge-sky' : `badge-${className.toLowerCase().replace(/\s/g, '').replace('.', '')}`;
            
            return `
                <div class="px-4 py-3 flex items-center justify-between hover:bg-gray-50 transition-colors">
                    <div class="flex items-center gap-3 overflow-hidden">
                        ${id ? `<span class="text-[9px] font-bold text-gray-300 w-4">${id}</span>` : ''}
                        <p class="text-[13px] font-600 text-gray-700 truncate">${name}</p>
                    </div>
                    <span class="badge ${badgeClass}">${className}</span>
                </div>
            `;
        }

        function renderAuction() {
            const grid = document.getElementById('auction-grid');
            grid.innerHTML = auctionData.map(item => `
                <div class="google-card p-5">
                    <div class="flex items-center gap-3 mb-4">
                        <i class="fas ${item.icon} text-${item.color}-600 text-sm"></i>
                        <span class="text-[11px] font-700 uppercase tracking-wider text-gray-500">${item.label}</span>
                    </div>
                    <div class="bg-${item.color}-50/50 p-3 rounded-xl border border-${item.color}-100/50 mb-4">
                        <span class="text-[9px] font-800 text-${item.color}-400 uppercase">Tuần này</span>
                        <p class="text-lg font-600 text-gray-900">${item.now}</p>
                    </div>
                    <div class="space-y-0.5">
                        ${item.next.map((n, i) => `
                            <div class="row-item py-2">
                                <span class="text-[11px] font-bold text-gray-400">W+${i+1}</span>
                                <span class="text-sm font-600 ${i === 3 ? 'text-blue-500' : ''}">${n}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function render() {
            document.getElementById('member-grid').innerHTML = membersData.filter(m => m.name !== "").map(m => createItem(m.name, m.class, m.id)).join('');
            document.getElementById('out-grid').innerHTML = outList.map((m, i) => createItem(m.name, m.class, i + 1)).join('');
            document.getElementById('in-grid').innerHTML = inList.map((m, i) => createItem(m.name, m.class, i + 1)).join('');
            renderAuction();
        }

        window.onload = render;
    </script>
</body>
</html>
