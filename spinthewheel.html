<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vòng Quay May Mắn iOS</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        iosBg: '#f2f2f7',
                        iosCard: '#ffffff',
                        iosBlue: '#007aff',
                        iosGreen: '#34c759',
                        iosRed: '#ff3b30',
                        iosOrange: '#ff9500',
                        iosPink: '#ff2d55',
                        iosIndigo: '#5856d6',
                        iosTeal: '#30b0c0'
                    }
                }
            }
        }
    </script>
    <style>
        /* Tối ưu hóa cuộn mượt mà kiểu iOS */
        .ios-scroll {
            -webkit-overflow-scrolling: touch;
        }
        /* Loại bỏ highlight màu xanh lam khi chạm trên Safari iOS */
        button, div, canvas {
            -webkit-tap-highlight-color: transparent;
        }
        /* Hiệu ứng nhấp nháy/gợn nhẹ khi bấm */
        .ios-active:active {
            transform: scale(0.96);
            opacity: 0.85;
        }
        /* Chuyển động mượt */
        .smooth-transition {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans h-screen flex flex-col justify-between overflow-hidden select-none">

    <!-- Canvas Pháo Hoa (Confetti) ẩn phía sau -->
    <canvas id="confetti-canvas" class="absolute inset-0 pointer-events-none z-50 w-full h-full"></canvas>

    <!-- Header ứng dụng phong cách iOS -->
    <header class="pt-6 pb-3 px-6 flex justify-between items-center bg-slate-900/80 backdrop-blur-md sticky top-0 z-10 border-b border-white/5">
        <div>
            <p class="text-xs font-semibold text-slate-400 tracking-wider uppercase">Ứng dụng giải trí</p>
            <h1 class="text-2xl font-bold tracking-tight">Lucky Wheel</h1>
        </div>
        <div class="flex space-x-2">
            <button id="btn-sound-toggle" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center ios-active smooth-transition">
                <i data-lucide="volume-2" class="w-5 h-5 text-iosBlue" id="sound-icon"></i>
            </button>
            <button id="btn-open-settings" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center ios-active smooth-transition">
                <i data-lucide="sliders" class="w-5 h-5 text-iosBlue"></i>
            </button>
        </div>
    </header>

    <!-- Khu vực Vòng Quay Chính -->
    <main class="flex-1 flex flex-col items-center justify-center p-4 relative">
        
        <!-- Bộ khung bánh xe + Kim chỉ -->
        <div class="relative w-full max-w-[340px] aspect-square flex items-center justify-center">
            
            <!-- Hiệu ứng bóng đổ Neon bao quanh vòng quay -->
            <div class="absolute inset-0 bg-iosBlue/10 rounded-full blur-2xl transform scale-95 pointer-events-none"></div>

            <!-- Kim Chỉ Vách Ngăn (iOS Pin) thiết kế 3D sắc sảo phía trên -->
            <div class="absolute -top-3 z-30 flex flex-col items-center">
                <div id="wheel-peg" class="w-6 h-8 origin-top smooth-transition" style="transform: rotate(0deg);">
                    <svg viewBox="0 0 24 32" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-6 h-8 drop-shadow-md">
                        <path d="M12 32C12 32 24 16 24 10C24 4.47715 19.5228 0 14 0H10C4.47715 0 0 4.47715 0 10C0 16 12 32 12 32Z" fill="url(#peg-grad)"/>
                        <circle cx="12" cy="10" r="4" fill="#ffffff"/>
                        <defs>
                            <linearGradient id="peg-grad" x1="12" y1="0" x2="12" y2="32" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#ff3b30"/>
                                <stop offset="1" stop-color="#ff2d55"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
            </div>

            <!-- Khung viền kim loại sáng bóng bao ngoài vòng quay -->
            <div class="absolute inset-1 rounded-full border-[6px] border-white/20 shadow-inner z-10 pointer-events-none"></div>

            <!-- Canvas vẽ Vòng quay -->
            <canvas id="wheel-canvas" class="w-full h-full rounded-full cursor-pointer z-0 transform shadow-2xl transition-transform duration-[4000ms] cubic-bezier(0.15, 0.85, 0.2, 1)"></canvas>

            <!-- Nút bấm quay ở trung tâm (iOS Style Center Button) -->
            <button id="btn-spin-center" class="absolute w-20 h-20 rounded-full bg-white text-slate-900 font-extrabold text-sm flex flex-col items-center justify-center shadow-2xl z-20 ios-active smooth-transition border-4 border-slate-900 uppercase tracking-wider">
                <span class="text-xs text-slate-500 font-bold">BẤM</span>
                <span class="text-base text-iosBlue font-black -mt-1">QUAY</span>
            </button>
        </div>

        <!-- Hướng dẫn nhanh bên dưới -->
        <p class="text-sm text-slate-400 mt-8 text-center px-6">
            Nhấn <span class="text-iosBlue font-semibold">QUAY</span> hoặc chạm trực tiếp vào vòng xoay để bắt đầu thử thách!
        </p>

    </main>

    <!-- Thanh Điều Hướng Dưới (iOS Tab Bar) -->
    <footer class="bg-slate-900/90 backdrop-blur-md border-t border-white/5 pb-8 pt-3 px-8 flex justify-around items-center z-10">
        <button id="nav-wheel" class="flex flex-col items-center space-y-1 text-iosBlue">
            <i data-lucide="circle-dot" class="w-6 h-6"></i>
            <span class="text-xs font-medium">Vòng Quay</span>
        </button>
        <button id="nav-settings" class="flex flex-col items-center space-y-1 text-slate-400 hover:text-white transition-colors">
            <i data-lucide="settings" class="w-6 h-6"></i>
            <span class="text-xs font-medium">Tùy Chọn</span>
        </button>
    </footer>

    <!-- iOS Bottom Sheet: Bảng kết quả (Trượt từ đáy lên) -->
    <div id="result-sheet" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex justify-center items-end opacity-0 pointer-events-none transition-opacity duration-300">
        <!-- Khung chứa nội dung Sheet -->
        <div id="result-sheet-content" class="w-full max-w-md bg-slate-900 border-t border-white/10 rounded-t-[2.5rem] p-6 pb-12 flex flex-col items-center transform translate-y-full transition-transform duration-300 shadow-2xl">
            <!-- Thanh kéo giả lập iOS -->
            <div class="w-12 h-1.5 bg-white/20 rounded-full mb-6"></div>

            <div class="w-20 h-20 rounded-full bg-iosBlue/10 flex items-center justify-center mb-4">
                <i data-lucide="trophy" class="w-10 h-10 text-yellow-400 animate-bounce"></i>
            </div>

            <h2 class="text-xl font-medium text-slate-400 mb-1">Chúc mừng bạn đã trúng</h2>
            <div id="result-text" class="text-3xl font-black text-white text-center tracking-tight px-4 mb-8 leading-snug">
                Phần Thưởng!
            </div>

            <div class="w-full flex space-x-3">
                <button id="btn-share-result" class="flex-1 py-4 px-6 bg-white/10 text-white font-semibold rounded-2xl ios-active smooth-transition flex justify-center items-center space-x-2">
                    <i data-lucide="share" class="w-5 h-5"></i>
                    <span>Sao chép</span>
                </button>
                <button id="btn-close-result" class="flex-1 py-4 px-6 bg-iosBlue text-white font-semibold rounded-2xl ios-active smooth-transition">
                    Tuyệt vời!
                </button>
            </div>
        </div>
    </div>

    <!-- iOS Bottom Sheet: Trình Quản Lý & Cài Đặt (Trượt từ đáy lên) -->
    <div id="settings-sheet" class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm flex justify-center items-end opacity-0 pointer-events-none transition-opacity duration-300">
        <div id="settings-sheet-content" class="w-full max-w-md h-[85vh] bg-slate-900 border-t border-white/10 rounded-t-[2.5rem] flex flex-col transform translate-y-full transition-transform duration-300 shadow-2xl overflow-hidden">
            
            <!-- Header của Panel cài đặt -->
            <div class="px-6 pt-5 pb-3 flex justify-between items-center border-b border-white/5 bg-slate-900">
                <div class="w-12"></div>
                <div class="flex flex-col items-center">
                    <div class="w-12 h-1.5 bg-white/20 rounded-full mb-2"></div>
                    <h3 class="text-lg font-bold">Cấu Hình Vòng Quay</h3>
                </div>
                <button id="btn-close-settings" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center ios-active smooth-transition">
                    <i data-lucide="x" class="w-4 h-4 text-slate-400"></i>
                </button>
            </div>

            <!-- Nội dung cuộn dạng iOS Table View -->
            <div class="flex-1 overflow-y-auto p-6 space-y-6 ios-scroll bg-slate-950">
                
                <!-- Section: Nhập nhanh/Quản lý danh sách -->
                <div class="space-y-3">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider pl-2 block">Thêm phần thưởng mới</label>
                    <form id="add-item-form" class="flex space-x-2">
                        <input type="text" id="new-item-input" placeholder="Ví dụ: iPhone 15 Pro, 50K xu..." class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-iosBlue text-base smooth-transition">
                        <button type="submit" class="w-12 h-12 bg-iosBlue rounded-2xl flex items-center justify-center ios-active smooth-transition">
                            <i data-lucide="plus" class="w-6 h-6"></i>
                        </button>
                    </form>
                </div>

                <!-- Section: Danh sách các phần thưởng hiện tại -->
                <div class="space-y-3">
                    <div class="flex justify-between items-center px-2">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block">Danh sách phần quà (<span id="items-count">0</span>)</label>
                        <button id="btn-reset-items" class="text-xs font-semibold text-iosRed hover:opacity-80 transition-opacity">Đặt lại mặc định</button>
                    </div>
                    <div id="items-list-container" class="bg-slate-900/80 border border-white/5 rounded-2xl divide-y divide-white/5 overflow-hidden">
                        <!-- Các item sẽ tự động render ở đây -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Khung thông báo nhỏ tự biến mất (Toast iOS Style) -->
    <div id="ios-toast" class="fixed top-8 left-1/2 transform -translate-x-1/2 z-50 bg-slate-800/90 backdrop-blur-md border border-white/10 py-3 px-6 rounded-full shadow-2xl opacity-0 pointer-events-none transition-all duration-300 text-sm font-semibold flex items-center space-x-2">
        <i data-lucide="check-circle" class="w-4 h-4 text-iosGreen"></i>
        <span id="toast-message">Đã sao chép liên kết</span>
    </div>

    <!-- Script điều khiển Logic chính -->
    <script>
        // Khởi tạo các Icons của Lucide
        lucide.createIcons();

        // 1. Quản lý trạng thái và Dữ liệu mặc định
        let items = JSON.parse(localStorage.getItem('ios_spin_items')) || [
            { text: "🌟 Mac Pro", color: "#007aff" },
            { text: "📱 iPhone 16", color: "#34c759" },
            { text: "🎧 AirPods 4", color: "#ff9500" },
            { text: "⌚️ Apple Watch", color: "#ff2d55" },
            { text: "☕️ Ly Cà Phê", color: "#5856d6" },
            { text: "🍀 May mắn lần sau", color: "#8e8e93" },
            { text: "💵 Thẻ Quà 100K", color: "#30b0c0" },
            { text: "🍿 Combo Bắp Nước", color: "#af52de" }
        ];

        const defaultItems = [
            { text: "🌟 Mac Pro", color: "#007aff" },
            { text: "📱 iPhone 16", color: "#34c759" },
            { text: "🎧 AirPods 4", color: "#ff9500" },
            { text: "⌚️ Apple Watch", color: "#ff2d55" },
            { text: "☕️ Ly Cà Phê", color: "#5856d6" },
            { text: "🍀 May mắn lần sau", color: "#8e8e93" },
            { text: "💵 Thẻ Quà 100K", color: "#30b0c0" },
            { text: "🍿 Combo Bắp Nước", color: "#af52de" }
        ];

        // Màu sắc iOS sang trọng ngẫu nhiên cho thêm mới
        const iosColors = ["#007aff", "#34c759", "#ff9500", "#ff2d55", "#5856d6", "#30b0c0", "#af52de", "#ff3b30"];

        let isSoundEnabled = true;
        let isSpinning = false;
        let currentRotation = 0; // Góc quay hiện tại (đơn vị: radian)
        
        // Cấu hình âm thanh Web Audio API (Giả lập tiếng gõ/tạch tạch cơ học)
        let audioCtx = null;
        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playTickSound() {
            if (!isSoundEnabled) return;
            initAudioContext();
            if (!audioCtx) return;

            // Kích hoạt lại audio context nếu nó bị treo (quy định bảo mật trình duyệt)
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            try {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'sine';
                // Tần số cao tạo tiếng gõ nảy lách tách
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.04);
                
                gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } catch (e) {
                console.log("Audio play error", e);
            }
        }

        // 2. DOM Elements
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const btnSpinCenter = document.getElementById('btn-spin-center');
        const btnSoundToggle = document.getElementById('btn-sound-toggle');
        const soundIcon = document.getElementById('sound-icon');
        const btnOpenSettings = document.getElementById('btn-open-settings');
        const btnCloseSettings = document.getElementById('btn-close-settings');
        const settingsSheet = document.getElementById('settings-sheet');
        const settingsSheetContent = document.getElementById('settings-sheet-content');
        
        const resultSheet = document.getElementById('result-sheet');
        const resultSheetContent = document.getElementById('result-sheet-content');
        const resultText = document.getElementById('result-text');
        const btnCloseResult = document.getElementById('btn-close-result');
        const btnShareResult = document.getElementById('btn-share-result');
        
        const navWheel = document.getElementById('nav-wheel');
        const navSettings = document.getElementById('nav-settings');
        
        const itemsListContainer = document.getElementById('items-list-container');
        const itemsCountSpan = document.getElementById('items-count');
        const addItemForm = document.getElementById('add-item-form');
        const newItemInput = document.getElementById('new-item-input');
        const btnResetItems = document.getElementById('btn-reset-items');
        
        const wheelPeg = document.getElementById('wheel-peg');
        const toast = document.getElementById('ios-toast');
        const toastMessage = document.getElementById('toast-message');

        // 3. Xử lý vẽ Vòng Quay lên Canvas cực kỳ sắc nét (Retina Display Ready)
        function resizeAndDrawWheel() {
            const size = canvas.parentElement.clientWidth;
            // Tối ưu hóa điểm ảnh cho màn hình retina sắc nét
            const dpr = window.devicePixelRatio || 1;
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            
            ctx.scale(dpr, dpr);
            drawWheel();
        }

        function drawWheel() {
            const size = canvas.width / (window.devicePixelRatio || 1);
            
            // THÊM KIỂM TRA BẢO VỆ: Nếu kích thước chưa được tải xong (size = 0), thoát sớm để tránh IndexSizeError
            if (size <= 0) return;

            const centerX = size / 2;
            const centerY = size / 2;
            
            // THÊM KIỂM TRA BẢO VỆ: Đảm bảo bán kính tối thiểu luôn là 1 và không bị âm
            const radius = Math.max(1, size / 2 - 10);
            const numSegments = items.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;

            ctx.clearRect(0, 0, size, size);

            if (numSegments === 0) {
                // Vẽ thông báo trống
                ctx.save();
                ctx.fillStyle = '#1e293b';
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = '#94a3b8';
                ctx.font = 'bold 16px -apple-system';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Thêm phần quà để quay!', centerX, centerY);
                ctx.restore();
                return;
            }

            // Vẽ từng miếng màu của vòng quay
            items.forEach((item, index) => {
                const startAngle = index * anglePerSegment + currentRotation;
                const endAngle = startAngle + anglePerSegment;

                // Thêm viền nhẹ giữa các mảng màu
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = item.color;
                ctx.fill();
                ctx.strokeStyle = 'rgba(15,23,42,0.15)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
            });

            // Vẽ chữ và icon lên từng phân vùng
            items.forEach((item, index) => {
                const startAngle = index * anglePerSegment + currentRotation;
                const textAngle = startAngle + anglePerSegment / 2;

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(textAngle);

                // Setup font chữ kiểu Apple iOS
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
                ctx.shadowBlur = 4;

                // Tự động căn chỉnh kích thước font chữ theo độ dài văn bản và số lượng phân vùng
                let fontSize = 14;
                if (numSegments > 10) fontSize = 11;
                if (numSegments > 15) fontSize = 9;
                ctx.font = `600 ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI"`;

                // Cắt bớt chữ nếu quá dài để hiển thị gọn gàng
                let text = item.text;
                if (text.length > 15) {
                    text = text.substring(0, 13) + '...';
                }

                // Vẽ text dịch ra viền ngoài vòng quay một khoảng thích hợp
                ctx.fillText(text, radius - 25, 0);
                ctx.restore();
            });

            // Vẽ viền ngoài sang trọng của vòng quay
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.restore();
        }

        // 4. Logic Xoay Vòng Quay (Sử dụng Vật lý/Giảm tốc mượt mà)
        function spin() {
            if (isSpinning || items.length === 0) return;
            isSpinning = true;
            initAudioContext();

            // Khóa hoạt động của các nút bấm cài đặt khi đang quay
            btnSpinCenter.disabled = true;
            btnSpinCenter.classList.add('opacity-50', 'scale-95');

            // Cấu hình xoay vật lý
            const numSegments = items.length;
            const segmentAngle = (2 * Math.PI) / numSegments;

            // Random từ 5 đến 7 vòng quay đầy đủ kèm theo góc lệch ngẫu nhiên
            const extraRounds = 5 + Math.floor(Math.random() * 3); 
            const targetRotation = currentRotation + (extraRounds * 2 * Math.PI) + (Math.random() * 2 * Math.PI);

            const duration = 5000; // Thời gian quay (ms)
            const startTime = performance.now();
            const startRotation = currentRotation;

            let lastTickSegment = -1;

            // Hàm chuyển động giảm tốc (iOS Ease-Out Cubic)
            function easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easedProgress = easeOutCubic(progress);

                // Cập nhật góc quay hiện tại
                currentRotation = startRotation + (targetRotation - startRotation) * easedProgress;
                drawWheel();

                // Xác định phân mảnh đang nằm dưới "kim chỉ" (vị trí -90 độ hay -Math.PI / 2 ở đỉnh)
                // Ta chuẩn hóa góc quay về đoạn [0, 2PI] để tính toán
                const normalizedAngle = (3 * Math.PI / 2 - currentRotation) % (2 * Math.PI);
                const positiveAngle = normalizedAngle < 0 ? normalizedAngle + 2 * Math.PI : normalizedAngle;
                const currentSegment = Math.floor(positiveAngle / segmentAngle) % numSegments;

                // Kích hoạt tiếng tạch của kim (Tick Sound) khi đổi phân mảnh
                if (currentSegment !== lastTickSegment) {
                    playTickSound();
                    
                    // Giả lập cử động rung cơ học nhẹ của kim chỉ
                    wheelPeg.style.transform = 'rotate(-18deg)';
                    setTimeout(() => {
                        wheelPeg.style.transform = 'rotate(0deg)';
                    }, 50);

                    lastTickSegment = currentSegment;
                }

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // Đã quay xong
                    isSpinning = false;
                    btnSpinCenter.disabled = false;
                    btnSpinCenter.classList.remove('opacity-50', 'scale-95');

                    // Hiển thị phần thưởng thắng cuộc
                    const winningItem = items[currentSegment];
                    showResult(winningItem.text);
                }
            }

            requestAnimationFrame(animate);
        }

        // 5. Quản lý Hiệu ứng Pháo hoa Thắng cuộc (Confetti) bằng Canvas
        let confettiAnimationId = null;
        const confettiCanvas = document.getElementById('confetti-canvas');
        const confettiCtx = confettiCanvas.getContext('2d');
        let confettiParticles = [];

        function resizeConfettiCanvas() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        }

        class ConfettiParticle {
            constructor() {
                this.x = Math.random() * confettiCanvas.width;
                this.y = Math.random() * -confettiCanvas.height - 20;
                this.size = Math.random() * 8 + 6;
                this.color = iosColors[Math.floor(Math.random() * iosColors.length)];
                this.speedY = Math.random() * 4 + 4;
                this.speedX = Math.random() * 3 - 1.5;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 4 - 2;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                confettiCtx.save();
                confettiCtx.translate(this.x, this.y);
                confettiCtx.rotate((this.rotation * Math.PI) / 180);
                confettiCtx.fillStyle = this.color;
                confettiCtx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                confettiCtx.restore();
            }
        }

        function startConfetti() {
            resizeConfettiCanvas();
            confettiParticles = [];
            for (let i = 0; i < 150; i++) {
                confettiParticles.push(new ConfettiParticle());
            }

            function updateConfetti() {
                confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                let alive = false;
                confettiParticles.forEach(p => {
                    if (p.y < confettiCanvas.height) {
                        p.update();
                        p.draw();
                        alive = true;
                    }
                });

                if (alive) {
                    confettiAnimationId = requestAnimationFrame(updateConfetti);
                }
            }
            
            cancelAnimationFrame(confettiAnimationId);
            updateConfetti();
        }

        function stopConfetti() {
            cancelAnimationFrame(confettiAnimationId);
            confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        }

        // 6. Hiển thị thông báo Toast kiểu iOS
        function showToast(message, isSuccess = true) {
            toastMessage.textContent = message;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 10px)';
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 0)';
            }, 2200);
        }

        // 7. Mở/Đóng các iOS Bottom Sheets
        function openSheet(sheet, content) {
            sheet.classList.remove('pointer-events-none');
            sheet.classList.add('opacity-100');
            content.classList.remove('translate-y-full');
            content.classList.add('translate-y-0');
        }

        function closeSheet(sheet, content) {
            content.classList.remove('translate-y-0');
            content.classList.add('translate-y-full');
            sheet.classList.remove('opacity-100');
            sheet.classList.add('opacity-0');
            sheet.classList.add('pointer-events-none');
        }

        function showResult(text) {
            resultText.textContent = text;
            openSheet(resultSheet, resultSheetContent);
            startConfetti();
        }

        // 8. Quản lý cài đặt & Cập nhật danh sách phần thưởng
        function renderSettingsList() {
            itemsListContainer.innerHTML = '';
            itemsCountSpan.textContent = items.length;

            if (items.length === 0) {
                itemsListContainer.innerHTML = `
                    <div class="p-8 text-center text-slate-500 text-sm">
                        Chưa có phần thưởng nào. Hãy nhập thêm ở trên!
                    </div>
                `;
                return;
            }

            items.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'flex items-center justify-between p-4 bg-slate-900/60 hover:bg-slate-800/40 transition-colors duration-150';
                itemDiv.innerHTML = `
                    <div class="flex items-center space-x-3 flex-1 min-w-0">
                        <span class="w-4 h-4 rounded-full flex-shrink-0" style="background-color: ${item.color}"></span>
                        <span class="text-white text-base font-medium truncate">${item.text}</span>
                    </div>
                    <button class="btn-delete-item w-8 h-8 rounded-full bg-iosRed/10 flex items-center justify-center ios-active transition-opacity ml-2" data-index="${index}">
                        <i data-lucide="trash-2" class="w-4 h-4 text-iosRed"></i>
                    </button>
                `;
                itemsListContainer.appendChild(itemDiv);
            });

            // Gán lại icons
            lucide.createIcons();

            // Gán hành động xóa phần tử
            document.querySelectorAll('.btn-delete-item').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-index'));
                    items.splice(idx, 1);
                    saveAndRefresh();
                    showToast("Đã xóa quà");
                });
            });
        }

        function saveAndRefresh() {
            localStorage.setItem('ios_spin_items', JSON.stringify(items));
            renderSettingsList();
            resizeAndDrawWheel();
        }

        // 9. Lắng nghe Sự kiện & Tương tác người dùng
        
        // Sự kiện kích hoạt quay
        btnSpinCenter.addEventListener('click', (e) => {
            e.stopPropagation();
            spin();
        });
        
        canvas.addEventListener('click', spin);

        // Bật tắt âm thanh
        btnSoundToggle.addEventListener('click', () => {
            isSoundEnabled = !isSoundEnabled;
            if (isSoundEnabled) {
                soundIcon.setAttribute('data-lucide', 'volume-2');
                soundIcon.className = 'w-5 h-5 text-iosBlue';
                showToast("Đã bật âm thanh");
            } else {
                soundIcon.setAttribute('data-lucide', 'volume-x');
                soundIcon.className = 'w-5 h-5 text-slate-400';
                showToast("Đã tắt âm thanh");
            }
            lucide.createIcons();
        });

        // Đóng mở Settings Sheet
        btnOpenSettings.addEventListener('click', () => openSheet(settingsSheet, settingsSheetContent));
        btnOpenSettings.addEventListener('click', () => openSheet(settingsSheet, settingsSheetContent));
        btnCloseSettings.addEventListener('click', () => closeSheet(settingsSheet, settingsSheetContent));
        navSettings.addEventListener('click', () => openSheet(settingsSheet, settingsSheetContent));
        navWheel.addEventListener('click', () => closeSheet(settingsSheet, settingsSheetContent));

        // Click ra ngoài vùng bottom sheet để đóng
        settingsSheet.addEventListener('click', (e) => {
            if (e.target === settingsSheet) {
                closeSheet(settingsSheet, settingsSheetContent);
            }
        });

        resultSheet.addEventListener('click', (e) => {
            if (e.target === resultSheet) {
                closeSheet(resultSheet, resultSheetContent);
                stopConfetti();
            }
        });

        btnCloseResult.addEventListener('click', () => {
            closeSheet(resultSheet, resultSheetContent);
            stopConfetti();
        });

        // Sao chép kết quả thắng cuộc
        btnShareResult.addEventListener('click', () => {
            const tempInput = document.createElement('input');
            tempInput.value = `Tôi đã quay trúng: ${resultText.textContent} trên Vòng Quay May Mắn!`;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            showToast("Đã sao chép kết quả!");
        });

        // Form thêm phần thưởng mới
        addItemForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = newItemInput.value.trim();
            if (!text) return;

            if (items.length >= 24) {
                showToast("Giới hạn tối đa 24 ô phần thưởng!");
                return;
            }

            // Chọn ngẫu nhiên màu sắc iOS
            const color = iosColors[Math.floor(Math.random() * iosColors.length)];
            items.push({ text, color });
            newItemInput.value = '';
            saveAndRefresh();
            showToast("Đã thêm thành công!");
        });

        // Đặt lại danh sách mặc định
        btnResetItems.addEventListener('click', () => {
            items = [...defaultItems];
            saveAndRefresh();
            showToast("Đã khôi phục cài đặt gốc");
        });

        // Lắng nghe sự kiện xoay màn hình hoặc đổi kích thước cửa sổ để vẽ lại vòng quay
        window.addEventListener('resize', () => {
            resizeAndDrawWheel();
            if (confettiCanvas.width > 0) {
                resizeConfettiCanvas();
            }
        });

        // 10. Khởi tạo ban đầu khi tải xong ứng dụng
        window.onload = function() {
            renderSettingsList();
            resizeAndDrawWheel();
        };
    </script>
</body>
</html>
