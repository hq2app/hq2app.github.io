        // Chuẩn hóa xóa dấu tiếng Việt phục vụ tra cứu siêu tốc không dấu
        function removeVietnameseTones(str) {
            str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
            str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
            str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
            str = str.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
            str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
            str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
            str = str.replace(/đ/g, "d");
            str = str.replace(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
            str = str.replace(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
            str = str.replace(/Ì|Í|Ị|Ỉ|Ĩ/g, "I");
            str = str.replace(/Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "O");
            str = str.replace(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
            str = str.replace(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
            str = str.replace(/Đ/g, "D");
            str = str.replace(/\u0300|\u0301|\u0303|\u0309|\u0323/g, ""); 
            str = str.replace(/\u02C6|\u0306|\u031B/g, ""); 
            return str.toLowerCase().trim();
        }

        // Vẽ và cập nhật thanh điều hướng cột trên Mobile
        function renderMobileColSelector() {
            const container = document.getElementById('mobile-col-navbar');

                { id: "hoa", label: "Hóa học" },
                { id: "vatly", label: "Vật lý & SI" },
                { id: "domeo", label: "Đố mẹo" }

                { id: "toan", label: "Đố mẹo I" },
                { id: "hoa", label: "Đố mẹo II" },
                { id: "vatly", label: "Tự nhiên I" },
                { id: "domeo", label: "Tự nhiên II" }

            tabsData.forEach(tab => {
                const btn = document.createElement('button');
                btn.className = `flex-1 py-1.5 px-3 text-[10px] md:text-xs font-bold rounded-md transition-all whitespace-nowrap text-center ${
                    activeMobileCol === tab.id 
                    ? "bg-emerald-500 text-white shadow-sm" 
                    : "bg-slate-100 text-slate-600 hover:text-slate-900"

                btn.innerText = tab.label;
                btn.setAttribute('onclick', `switchMobileColumn('${tab.id}')`);
                container.appendChild(btn);

        // Chuyển đổi cột hiển thị trên thiết bị di động
        function switchMobileColumn(colId) {
            activeMobileCol = colId;

            updateMobileColumnVisibility();

        // Đồng bộ hóa trạng thái hiển thị các cột (Ẩn cột không hoạt động trên mobile, hiện tất cả trên desktop)
        function updateMobileColumnVisibility() {
            const sectionMap = {
                toan: document.getElementById('sec-toan'),
                hoa: document.getElementById('sec-hoa'),
                vatly: document.getElementById('sec-vatly'),
                domeo: document.getElementById('sec-domeo')

            Object.keys(sectionMap).forEach(key => {
                const sec = sectionMap[key];
                if (key === activeMobileCol) {
                    sec.className = "col-section bg-white border border-slate-200 rounded-lg p-2 flex flex-col h-full overflow-hidden shadow-sm flex lg:flex";
                } else {
                    sec.className = "col-section bg-white border border-slate-200 rounded-lg p-2 flex flex-col h-full overflow-hidden shadow-sm hidden lg:flex";
                }
            });
        }

        // Xử lý sự kiện tìm kiếm và đồng bộ
        function handleSearch() {
            const val = document.getElementById('search-input').value;
            const clearBtn = document.getElementById('clear-btn');
            if (val.trim() !== '') {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }
            renderAllColumns();
        }

        // Xóa sạch ô tìm kiếm nhanh bằng nút bấm hoặc ESC
        function clearSearch() {
            const input = document.getElementById('search-input');
            input.value = '';
            document.getElementById('clear-btn').classList.add('hidden');
            input.focus();
            renderAllColumns();
        }

        // Bộ máy nạp và vẽ giao diện tối ưu hóa tốc độ cao
        function renderAllColumns() {
            const query = document.getElementById('search-input').value.trim();
            const normalizedQuery = removeVietnameseTones(query);

            // Phân tách dữ liệu lọc theo chế độ thi đang chọn
            const examFilteredData = QUESTIONS_DB.filter(item => item.exam === currentExamMode);

            const filteredData = examFilteredData.filter(item => {
                if (normalizedQuery === '') return true;
                const normQ = removeVietnameseTones(item.q);
                const normA = removeVietnameseTones(item.a);
                const normNote = removeVietnameseTones(item.note || '');
                return normQ.includes(normalizedQuery) || normA.includes(normalizedQuery) || normNote.includes(normalizedQuery);
            });

            // Phân chia dữ liệu theo nhóm cột (Tái sử dụng các nhóm toan, hoa, vatly, domeo)
            const colToanItems = filteredData.filter(x => x.topic === 'toan');
            const colHoaItems = filteredData.filter(x => x.topic === 'hoa');
            const colVatlyItems = filteredData.filter(x => x.topic === 'vatly');
            const colDomeoItems = filteredData.filter(x => x.topic === 'domeo');

            // Cập nhật số lượng đầu mục trong tiêu đề các cột
            document.getElementById('count-toan').innerText = colToanItems.length;
            document.getElementById('count-hoa').innerText = colHoaItems.length;
            document.getElementById('count-vatly').innerText = colVatlyItems.length;
            document.getElementById('count-domeo').innerText = colDomeoItems.length;

            // Tiến hành vẽ cột hàng ngang
            renderSingleColumn('col-toan', colToanItems, query);
            renderSingleColumn('col-hoa', colHoaItems, query);
            renderSingleColumn('col-vatly', colVatlyItems, query);
            renderSingleColumn('col-domeo', colDomeoItems, query);

            // Đồng bộ bộ chọn cột di động và trạng thái ẩn/hiện cột
            renderMobileColSelector();
            updateMobileColumnVisibility();
        }

        // Vẽ từng hàng cho một cột chỉ định - HIỂN THỊ CHIỀU NGANG (Đáp án bên phải, không click copy)
        function renderSingleColumn(containerId, items, query) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            if (items.length === 0) {
                container.innerHTML = `<div class="text-[10px] text-slate-400 italic py-4 text-center">Trống...</div>`;
                return;
            }

            items.forEach(item => {
                const highlightedQ = highlightText(item.q, query);
                const highlightedA = highlightText(item.a, query);

                // Tạo thẻ hàng dẹt định dạng flex-row, căn chỉnh giữa: Câu hỏi trái, đáp án phải. Hoàn toàn tĩnh
                const row = document.createElement('div');
                row.className = "p-1.5 rounded border border-slate-100 bg-white hover:bg-slate-50 flex flex-row items-center justify-between gap-2 shadow-sm min-h-[42px] cursor-default select-text";

                row.innerHTML = `
                    <div class="text-[10.5px] font-semibold text-slate-800 leading-snug flex-1 pr-1 select-text">
                        ${highlightedQ}
                        ${item.note ? `<span class="text-[8.5px] font-normal text-slate-400 block italic leading-none mt-0.5 select-text">${item.note}</span>` : ''}
                    </div>
                    <div class="flex items-center shrink-0">
                        <span class="px-1.5 py-0.5 text-[10.5px] font-black bg-emerald-500 text-white rounded shadow-sm border border-emerald-600 tracking-wide select-all whitespace-nowrap">
                            ${highlightedA}
                        </span>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        // Tự động Highlight cụm từ tìm kiếm
        function highlightText(text, keyword) {
            if (!keyword.trim()) return text;
            try {
                const escaped = keyword.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                const regex = new RegExp(`(${escaped})`, 'gi');
                return text.replace(regex, `<mark class="bg-yellow-200 text-slate-900 rounded-sm font-bold">$1</mark>`);
            } catch(e) {
                return text;
            }
        }

        // Sự kiện phím nóng ESC để xóa nhanh tìm kiếm
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                clearSearch();
            }
            if (event.key === '/' && document.activeElement.id !== 'search-input') {
                event.preventDefault();
                document.getElementById('search-input').focus();
            }
        });
